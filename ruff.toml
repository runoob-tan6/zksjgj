# Ruff code quality configuration.
# Keep Ruff settings here only; project metadata and pytest settings live in pyproject.toml.

line-length = 120
target-version = "py310"
fix = true

exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "__pycache__",
    "build",
    "coverage",
    "dist",
    "*.egg-info",
    "venv",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]

ignore = [
    "E501",   # line length is handled by the formatter
    "B008",   # existing Tkinter callbacks use function calls in defaults
    "RUF001", # Chinese punctuation is normal in this project
    "RUF002", # Chinese punctuation is normal in this project
    "RUF003", # Chinese punctuation is normal in this project
]

[lint.isort]
known-first-party = ["borehole_app"]

[lint.pep8-naming]
ignore-names = [
    "test_*",
    "*_test",
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
